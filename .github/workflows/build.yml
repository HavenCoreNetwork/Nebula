on: push

jobs:
  Generate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v2
        with:
          repository: HavenCoreNetwork/Nebula
          path: master
          token: ${{ secrets.TOKEN }}

      - name: Checkout modpacks repo
        uses: actions/checkout@v2
        with:
          repository: HavenCoreNetwork/HavenCoreModpacks
          path: master
      
      - name: print dirs
        run: ls

      - name: Setup Java
        uses: actions/setup-java@v2
        with:
          distribution: 'adopt-hotspot'
          java-version: '8'
          java-package: 'jre'

      - name: Setup Node 14.x
        uses: actions/setup-node@v2
        with:
          node-version: '14.x'
          cache: 'npm'
      - run: npm ci

